[tox]
# tox 4 builds the package via the PEP 517 backend (hatchling + hatch-vcs),
# so the version is taken from git just like a real release build.
env_list = py310, py311, py312, lint, build
requires = tox>=4.0

[testenv]
description = Run the test suite under {basepython}
extras = test
commands = pytest {posargs}

[testenv:lint]
description = Static checks with ruff (lint + format verification)
skip_install = true
deps = ruff>=0.6
commands =
    ruff check .
    ruff format --check .

[testenv:build]
description = Build sdist + wheel and verify their metadata
skip_install = true
deps =
    build>=1.0
    twine>=5.0
commands =
    python -m build
    twine check dist/*

[gh]
# Used by CI to map the runner's Python to the matching tox env.
python =
    3.10 = py310
    3.11 = py311
    3.12 = py312
